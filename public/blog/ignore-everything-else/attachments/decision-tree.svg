<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="548" viewBox="0 0 1080 548" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
<rect width="1080" height="548" fill="#ffffff"/>
<text x="56" y="46" font-size="24" font-weight="700" fill="#16202e">One tree in the forest</text>
<text x="56" y="72" font-size="14" fill="#8892a0">Each tree is a flowchart of yes/no questions ending in make or miss. The forest grows 300 and votes.</text>
<rect x="72" y="86" width="968" height="384" rx="14" fill="#f1f3f6" stroke="#e3e7ec"/>
<rect x="64" y="94" width="968" height="384" rx="14" fill="#f1f3f6" stroke="#e3e7ec"/>
<rect x="56" y="102" width="968" height="384" rx="14" fill="#ffffff" stroke="#dfe4ea"/>
<text x="1006" y="128" font-size="12" font-weight="700" text-anchor="end" fill="#a2abb8">1 of 300 trees</text>
<line x1="540" y1="201" x2="340" y2="271" stroke="#c2ccd8" stroke-width="2"/><rect x="424.0" y="225.0" width="32" height="19" rx="9.5" fill="#fff" stroke="#dde3ea"/><text x="440.0" y="238" font-size="11" font-weight="700" text-anchor="middle" fill="#5a6472">no</text>
<line x1="540" y1="201" x2="740" y2="271" stroke="#c2ccd8" stroke-width="2"/><rect x="624.0" y="225.0" width="32" height="19" rx="9.5" fill="#fff" stroke="#dde3ea"/><text x="640.0" y="238" font-size="11" font-weight="700" text-anchor="middle" fill="#5a6472">yes</text>
<line x1="340" y1="329" x2="250" y2="395" stroke="#c2ccd8" stroke-width="2"/><rect x="279.0" y="351.0" width="32" height="19" rx="9.5" fill="#fff" stroke="#dde3ea"/><text x="295.0" y="364" font-size="11" font-weight="700" text-anchor="middle" fill="#5a6472">yes</text>
<line x1="340" y1="329" x2="430" y2="395" stroke="#c2ccd8" stroke-width="2"/><rect x="369.0" y="351.0" width="32" height="19" rx="9.5" fill="#fff" stroke="#dde3ea"/><text x="385.0" y="364" font-size="11" font-weight="700" text-anchor="middle" fill="#5a6472">no</text>
<line x1="740" y1="329" x2="650" y2="395" stroke="#c2ccd8" stroke-width="2"/><rect x="679.0" y="351.0" width="32" height="19" rx="9.5" fill="#fff" stroke="#dde3ea"/><text x="695.0" y="364" font-size="11" font-weight="700" text-anchor="middle" fill="#5a6472">no</text>
<line x1="740" y1="329" x2="830" y2="395" stroke="#c2ccd8" stroke-width="2"/><rect x="769.0" y="351.0" width="32" height="19" rx="9.5" fill="#fff" stroke="#dde3ea"/><text x="785.0" y="364" font-size="11" font-weight="700" text-anchor="middle" fill="#5a6472">yes</text>
<rect x="409.0" y="139.0" width="262" height="62" rx="9" fill="#eaf1f8" stroke="#9db8d4" stroke-width="1.5"/><text x="420" y="154" font-size="9" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" fill="#9aa4b0">peak_above_after</text><text x="540" y="174" font-size="13" font-weight="600" text-anchor="middle" fill="#1e2a3a">Did the ball stay low,</text><text x="540" y="190" font-size="13" font-weight="600" text-anchor="middle" fill="#1e2a3a">not bounce back up?</text>
<rect x="242.0" y="271.0" width="196" height="58" rx="9" fill="#eaf1f8" stroke="#9db8d4" stroke-width="1.5"/><text x="253" y="286" font-size="9" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" fill="#9aa4b0">final_dx</text><text x="340" y="304" font-size="13" font-weight="600" text-anchor="middle" fill="#1e2a3a">Clangs off</text><text x="340" y="320" font-size="13" font-weight="600" text-anchor="middle" fill="#1e2a3a">the rim?</text>
<rect x="642.0" y="271.0" width="196" height="58" rx="9" fill="#eaf1f8" stroke="#9db8d4" stroke-width="1.5"/><text x="653" y="286" font-size="9" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" fill="#9aa4b0">vanish_frac</text><text x="740" y="304" font-size="13" font-weight="600" text-anchor="middle" fill="#1e2a3a">Disappear into</text><text x="740" y="320" font-size="13" font-weight="600" text-anchor="middle" fill="#1e2a3a">the net?</text>
<rect x="175.0" y="395.0" width="150" height="50" rx="25.0" fill="#7e8896"/><text x="250" y="418" font-size="14" font-weight="800" text-anchor="middle" fill="#fff">MISS</text><text x="250" y="434" font-size="10.5" text-anchor="middle" fill="#eef3f6">bricked</text>
<rect x="355.0" y="395.0" width="150" height="50" rx="25.0" fill="#7e8896"/><text x="430" y="418" font-size="14" font-weight="800" text-anchor="middle" fill="#fff">MISS</text><text x="430" y="434" font-size="10.5" text-anchor="middle" fill="#eef3f6">rattled out</text>
<rect x="575.0" y="395.0" width="150" height="50" rx="25.0" fill="#7e8896"/><text x="650" y="418" font-size="14" font-weight="800" text-anchor="middle" fill="#fff">MISS</text><text x="650" y="434" font-size="10.5" text-anchor="middle" fill="#eef3f6">airball</text>
<rect x="755.0" y="395.0" width="150" height="50" rx="25.0" fill="#2f8f6a"/><text x="830" y="418" font-size="14" font-weight="800" text-anchor="middle" fill="#fff">MAKE</text><text x="830" y="434" font-size="10.5" text-anchor="middle" fill="#eef3f6">clean swish</text>
<text x="56" y="526" font-size="13.5" fill="#8892a0">Each tree saw a different slice of shots, so they disagree — the share of all 300 voting <tspan font-weight="700" fill="#2f8f6a">make</tspan> is the score.</text>
</svg>