<text x="527.0" y="393" font-size="16" font-weight="700" text-anchor="end" fill="#ffffff" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">251</text>
<text x="40" y="446" font-size="13.5" fill="#8892a0">The final <tspan font-weight="700" fill="#16202e">251</tspan> still hold all 76 makes — the filters never drop a basket. Going forward, that’s the pile I review, not all 448.</text>
