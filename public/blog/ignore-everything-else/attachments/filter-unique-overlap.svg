<text x="40" y="390" font-size="13.5" fill="#8892a0">The <tspan font-weight="700" fill="#2f6f9e">side-hoop model</tspan> and <tspan font-weight="700" fill="#2f6f9e">recall-safe queue</tspan> do most of the unique work; the other two catch little that’s unique.</text>
